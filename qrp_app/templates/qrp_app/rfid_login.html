<!DOCTYPE html>
<html lang="pl">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRP QC Platform - Logowanie</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'qrp_app/favicon.svg' %}">
    <link rel="icon" type="image/svg+xml" sizes="any" href="{% static 'qrp_app/favicon.svg' %}">
    <link rel="shortcut icon" type="image/svg+xml" href="{% static 'qrp_app/favicon.svg' %}">
    <link rel="apple-touch-icon" href="{% static 'qrp_app/favicon.svg' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 32rem;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }

        .icon-ping {
            position: absolute;
            inset: 0;
        }

        .ping-circle {
            position: absolute;
            inset: 0;
            border: 3px solid #06b6d4;
            border-radius: 50%;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .icon-circle {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #06b6d4 0%, #2563eb 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.4);
        }

        .icon-circle svg {
            width: 60px;
            height: 60px;
            color: white;
        }

        .icon-circle.purple {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }

        .icon-circle.success {
            background: linear-gradient(135deg, #22c55e 0%, #10b981 100%);
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .subtitle.cyan {
            color: #06b6d4;
        }

        .subtitle.amber {
            color: #f59e0b;
        }

        .subtitle.purple {
            color: #7c3aed;
        }

        .subtitle.emerald {
            color: #22c55e;
        }

        .loading-dots {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #06b6d4;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f1f5f9;
            border-top-color: #f59e0b;
            border-radius: 50%;
            margin: 0 auto 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: #64748b;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .input-group {
            display: flex;
            align-items: center;
        }

        .input-prefix {
            background: #f1f5f9;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-right: none;
            border-radius: 0.5rem 0 0 0.5rem;
            font-weight: 700;
            color: #334155;
        }

        .form-input-group {
            flex: 1;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-left: none;
            border-radius: 0 0.5rem 0.5rem 0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input-group:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-register {
            background: linear-gradient(90deg, #7c3aed 0%, #a855f7 100%);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.4);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(124, 58, 237, 0.4);
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
        }

        .alert {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
        }

        .alert p {
            color: #dc2626;
            font-size: 0.875rem;
            font-weight: 600;
            margin: 0;
        }

        .invalid {
            border-color: #dc2626 !important;
            background: #fef2f2 !important;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .card {
                padding: 2rem 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="waitingState" class="card">
            <div class="icon-container">
                <div class="icon-ping">
                    <div class="ping-circle"></div>
                </div>
                <div class="icon-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <!-- RFID (Radio icon style): kropka + promienie po bokach -->
                        <circle cx="12" cy="12" r="2" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.24 7.76a6 6 0 0 1 0 8.49" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7.76 7.76a6 6 0 0 0 0 8.49" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.93 4.93a10 10 0 0 0 0 14.14" />
                    </svg>
                </div>
            </div>
            
            <h1>Przyłóż kartę do czytnika</h1>
            <p class="subtitle cyan">Oczekiwanie na sygnał RFID</p>
            
            <div class="loading-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>

        <div id="processingState" class="card hidden">
            <div class="spinner"></div>
            <h1>PRZETWARZANIE</h1>
            <p class="subtitle amber">Weryfikacja karty...</p>
        </div>

        <div id="registrationState" class="card hidden">
            <div class="icon-circle purple" style="width: 4rem; height: 4rem; margin: 0 auto 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M18 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0ZM3 19.235v-.11a6.375 6.375 0 0 1 12.75 0v.109A12.318 12.318 0 0 1 9.374 21c-2.331 0-4.512-.645-6.374-1.766Z" />
                </svg>
            </div>
            <h2>NOWA KARTA</h2>
            <p class="subtitle purple" style="margin-bottom: 1rem;">Wymagana rejestracja</p>
            
            <div id="errorAlert" class="alert hidden">
                <p id="errorMessage">Błąd</p>
            </div>

            <div class="form-group">
                <label>Login</label>
                <input type="text" id="userNameInput" 
                       placeholder="np. jan.kowalski" 
                       class="form-input" 
                       autocomplete="off">
            </div>

            <div class="form-group" id="kjInputGroup" {% if not rejestrator_dla_kj %}style="display: none;"{% endif %}>
                <label>Numer KJ</label>
                <div class="input-group">
                    <div class="input-prefix">KJ</div>
                    <input type="tel" id="kjNumberInput" 
                           class="form-input-group" 
                           placeholder="np. 10 (max 3 cyfry)" 
                           maxlength="3" 
                           pattern="\d*">
                </div>
            </div>

            <div class="btn-group">
                <button id="registerButton" class="btn btn-register">ZAREJESTRUJ</button>
                <button id="cancelButton" class="btn btn-cancel">ANULUJ</button>
            </div>
        </div>

        <div id="successState" class="card hidden">
            <div class="icon-circle success" style="width: 5rem; height: 5rem; margin: 0 auto 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1>ZALOGOWANO</h1>
            <p class="subtitle emerald" id="successMessage">Witaj!</p>
        </div>
    </div>

    <script>
        const LOGIN_URL = "{% url 'qrp_app:api_login' %}";
        const REGISTER_URL = "{% url 'qrp_app:api_register' %}";
        const CSRF_TOKEN = "{{ csrf_token }}";
        const REJESTRATOR_DLA_KJ = {{ rejestrator_dla_kj|yesno:"true,false" }};

        document.addEventListener('DOMContentLoaded', function() {
            let rfidBuffer = '';
            let isProcessing = false;
            let currentRfid = null;

            const states = {
                waiting: document.getElementById('waitingState'),
                processing: document.getElementById('processingState'),
                registration: document.getElementById('registrationState'),
                success: document.getElementById('successState')
            };

            const userNameInput = document.getElementById('userNameInput');
            const kjNumberInput = document.getElementById('kjNumberInput');
            const kjInputGroup = document.getElementById('kjInputGroup');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            
            // Ukryj pole numeru KJ jeśli rejestrator nie jest dla KJ
            if (!REJESTRATOR_DLA_KJ && kjInputGroup) {
                kjInputGroup.style.display = 'none';
            }

            function showState(stateName) {
                Object.values(states).forEach(el => { if(el) el.classList.add('hidden'); });
                if(states[stateName]) states[stateName].classList.remove('hidden');

                if(stateName === 'waiting') {
                    if(userNameInput) {
                        userNameInput.value = '';
                        userNameInput.classList.remove('invalid');
                    }
                    if(kjNumberInput) {
                        kjNumberInput.value = '';
                        if(kjInputGroup) kjInputGroup.classList.remove('invalid');
                    }
                    if(errorAlert) errorAlert.classList.add('hidden');
                }
            }

            if(kjNumberInput) {
                kjNumberInput.addEventListener('input', function(e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if(this.value.length > 3) this.value = this.value.slice(0, 3);
                });
            }

            document.addEventListener('keypress', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (isProcessing) return;

                if (e.which === 13) {
                    if (rfidBuffer.length > 0) {
                        handleLogin(rfidBuffer);
                        rfidBuffer = '';
                    }
                } else {
                    rfidBuffer += String.fromCharCode(e.which);
                }
            });

            async function handleLogin(code) {
                isProcessing = true;
                showState('processing');

                const formData = new URLSearchParams();
                formData.append('rfid_code', code);

                try {
                    const response = await fetch(LOGIN_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': CSRF_TOKEN },
                        body: formData
                    });
                    const data = await response.json();

                    if (data.success) {
                        showState('success');
                        const successMsg = document.getElementById('successMessage');
                        if(successMsg) successMsg.innerText = `Witaj, ${data.user}`;
                        setTimeout(() => window.location.href = data.redirect, 1000);
                    } else if (data.rfid_to_register) {
                        currentRfid = data.rfid_to_register;
                        showState('registration');
                        if(userNameInput) userNameInput.focus();
                        isProcessing = false;
                    } else {
                        showErrorNotification("Błąd: " + data.message);
                        showState('waiting');
                        isProcessing = false;
                    }
                } catch (e) {
                    console.error(e);
                    showErrorNotification("Błąd połączenia");
                    showState('waiting');
                    isProcessing = false;
                }
            }

            const registerBtn = document.getElementById('registerButton');
            if(registerBtn) {
                registerBtn.addEventListener('click', async () => {
                    const name = userNameInput.value.trim().toLowerCase();
                    const kjDigits = kjNumberInput.value.trim();
                    
                    userNameInput.classList.remove('invalid');
                    if(kjInputGroup) kjInputGroup.classList.remove('invalid');
                    if(errorAlert) errorAlert.classList.add('hidden');

                    const nameRegex = /^[a-z]+\.[a-z]+$/;
                    
                    if (!nameRegex.test(name)) {
                        showError("Login musi być w formacie: imie.nazwisko (tylko litery angielskie, bez polskich znaków!)");
                        userNameInput.classList.add('invalid');
                        return;
                    }

                    // Sprawdź numer KJ tylko jeśli rejestrator jest dla KJ
                    if (REJESTRATOR_DLA_KJ) {
                        if (!kjDigits || kjDigits.length === 0) {
                            showError("Podaj numer KJ!");
                            if(kjInputGroup) kjInputGroup.classList.add('invalid');
                            return;
                        }
                    }

                    const fullKj = REJESTRATOR_DLA_KJ ? ("KJ" + kjDigits) : "";

                    const formData = new URLSearchParams();
                    formData.append('rfid_code', currentRfid);
                    formData.append('name', name);
                    formData.append('kj_number', fullKj);

                    try {
                        const response = await fetch(REGISTER_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': CSRF_TOKEN },
                            body: formData
                        });
                        const data = await response.json();
                        
                        if (data.success) {
                            handleLogin(currentRfid);
                        } else {
                            showError(data.message);
                        }
                    } catch (e) {
                        showError("Błąd serwera podczas rejestracji");
                    }
                });
            }

            function showError(msg) {
                if(errorMessage && errorAlert) {
                    errorMessage.textContent = msg;
                    errorAlert.classList.remove('hidden');
                } else {
                    showErrorNotification(msg);
                }
            }

            const cancelBtn = document.getElementById('cancelButton');
            if(cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    showState('waiting');
                    isProcessing = false;
                    rfidBuffer = '';
                });
            }
        });
    </script>
</body>
</html>
